   return true;});
 rows.sort((a,b)=>{let x=val(a,COLS.find(c=>c.k===sortK)),y=val(b,COLS.find(c=>c.k===sortK));
   if(typeof x==="number")return (x-y)*sortDir;return (""+x).localeCompare(""+y)*sortDir;});
 const tb=document.getElementById("body");
 if(!rows.length){tb.innerHTML='<tr><td colspan="10" class="empty">无匹配结果</td></tr>';return;}
 tb.innerHTML=rows.map((r,i)=>{
   const dcls=dirCls(r.direction);
   const fill=r.fill_soonest?`<span class="fill">${r.fill_soonest}</span>`:`<span class="fill none">无缓解</span>`;
   const main=`<tr class="row" onclick="tog(${i})">
     <td class="mat">${r.material}${r.bottleneck?'<span class="bn">●</span>':''}</td>
     <td class="node">${r.node||'—'}</td>
     <td class="ly">${r.layer!==""?"L"+r.layer:""}</td>
     <td class="dir ${dcls}">${r.direction}</td>
     <td class="num">${r.price_pct||'—'}</td>
     <td class="num">${r.gap_pct||'—'}</td>
     <td>${fill}</td>
     <td><span class="badge c-${r.certainty}">${r.certainty}</span></td>
     <td class="men">${r.mentions}</td>
     <td class="st">${r.status||''}</td></tr>`;
   const obs=r.obs.map(o=>`<div class="obs">
     <span class="od">${o.date} · ${o.direction} · ${o.certainty}</span>
     <div class="om">${o.magnitude_text||o.status||''}</div>
     ${o.evidence?`<div class="oe">依据: ${o.evidence}</div>`:''}
     <div class="os">${o.fill_time_text?'补足: '+o.fill_time_text+' · ':''}${o.source&&o.source!=='-'?'来源: '+o.source:''}</div></div>`).join("");
   const det=`<tr class="detail" id="d${i}" style="display:none"><td colspan="10"><div class="obswrap">${obs}</div></td></tr>`;
   return main+det;}).join("");
}
function tog(i){const d=document.getElementById("d"+i);d.style.display=d.style.display==="none"?"":"none";}
render();
</script></body></html>
